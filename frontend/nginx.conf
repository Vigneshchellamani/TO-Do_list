server {
    listen 80;
    server_name your-domain.com;  # or your public IP, e.g., 184.73.130.244

    root /var/www/todo-app/frontend/build;
    index index.html;

    # Serve React frontend
    location / {
        try_files $uri /index.html;
    }

    # Proxy API requests to Node.js backend
    location /api/ {
        proxy_pass http://localhost:3000;  # backend runs on port 3000
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Optional: gzip compression for faster frontend loading
    gzip on;
    gzip_types text/plain application/javascript text/css application/json application/xml text/javascript;
    gzip_min_length 256;
}
